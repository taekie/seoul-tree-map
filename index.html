<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --c1: #FFFDE7; --c2: #FFD54F; --c3: #FFA000; --c4: #E65100;
  --p1: #E8F5E9; --p2: #81C784; --p3: #388E3C; --p4: #1B5E20;
  --bg: #ffffff; --text: #1a1a2e;
  --panel-bg: rgba(255,255,255,0.85);
  --panel-border: rgba(180,180,180,0.3);
  --input-bg: #f8f8f8;
}
.dark {
  --bg: #0f0f1a; --text: #e8e8f0;
  --panel-bg: rgba(20,20,40,0.85);
  --panel-border: rgba(150,150,150,0.2);
  --input-bg: #1a1a2e;
}
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
#map { position:absolute; top:0; left:0; right:0; bottom:0; z-index:1; }
.header {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; background:var(--panel-bg);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--panel-border);
}
.header h1 { font-size:20px; font-weight:700; color:var(--text); }
.header-stats { font-size:13px; color:#888; margin-left:12px; font-weight:500; }
.mode-toggle {
  background:var(--input-bg); border:1px solid var(--panel-border);
  border-radius:20px; padding:6px 14px; cursor:pointer;
  font-size:13px; color:var(--text); font-family:inherit; transition:all 0.3s;
}
.panel {
  position:absolute; top:56px; left:0; bottom:0; width:300px; z-index:999;
  background:var(--panel-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--panel-border); overflow-y:auto; padding:16px; padding-bottom:60px; transition:transform 0.3s;
}
.data-source {
  position:absolute; bottom:0; left:0; width:300px; z-index:1000;
  background:var(--panel-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--panel-border); border-right:1px solid var(--panel-border);
  padding:10px 16px; font-size:11px; color:#999; line-height:1.5;
  transition:transform 0.3s;
}
.panel.collapsed ~ .data-source { transform:translateX(-300px); }
.panel.collapsed { transform:translateX(-300px); }
.panel-toggle {
  position:absolute; top:66px; left:300px; z-index:999;
  background:var(--panel-bg); backdrop-filter:blur(20px);
  border:1px solid var(--panel-border); border-left:none;
  border-radius:0 8px 8px 0; padding:8px 6px; cursor:pointer;
  font-size:14px; color:var(--text); transition:left 0.3s;
}
.panel.collapsed + .panel-toggle { left:0; }
.search-box {
  width:100%; padding:10px 12px; border-radius:8px;
  border:1px solid var(--panel-border); background:var(--input-bg);
  font-size:14px; color:var(--text); font-family:inherit;
  margin-bottom:12px; outline:none;
}
.search-box:focus { border-color:#FFA000; }
.section-title {
  font-size:12px; font-weight:600; text-transform:uppercase;
  letter-spacing:1px; color:#888; margin-bottom:8px;
  padding-bottom:4px; border-bottom:1px solid var(--panel-border);
}
/* Species pill toggles */
.species-toggles { margin-bottom:16px; display:flex; flex-wrap:wrap; gap:6px; }
.species-pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:999px; cursor:pointer;
  font-size:12px; font-weight:600; border:1.5px solid transparent;
  transition:all 0.2s; user-select:none; white-space:nowrap;
}
.species-pill input { display:none; }
.species-pill .sp-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.species-pill.inactive {
  background:#f5f5f5; color:#aaa; border-color:#e5e5e5;
}
.species-pill.inactive .sp-dot { opacity:0.3; }
.dark .species-pill.inactive { background:#1e1e2e; color:#555; border-color:#333; }
.species-pill .sp-count { font-weight:400; opacity:0.7; }
.species-pill .sp-pct { font-size:10px; font-weight:400; opacity:0.5; }
.sp-all-btn {
  padding:2px 8px; border-radius:4px; border:1px solid var(--panel-border);
  background:var(--input-bg); color:#888; font-size:11px; cursor:pointer; font-family:inherit;
}
/* Gu filters — collapsible */
.gu-filters { margin-bottom:16px; }
.gu-header {
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; padding-bottom:4px; border-bottom:1px solid var(--panel-border);
  margin-bottom:8px;
}
.gu-header .section-title { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.gu-arrow { font-size:10px; color:#888; transition:transform 0.2s; }
.gu-header.open .gu-arrow { transform:rotate(180deg); }
.gu-body { display:none; }
.gu-body.open { display:block; }
.gu-all { display:flex; gap:6px; margin-bottom:8px; }
.gu-all button {
  flex:1; padding:4px 8px; border-radius:6px; border:1px solid var(--panel-border);
  background:var(--input-bg); color:var(--text); font-size:12px; cursor:pointer; font-family:inherit;
}
.gu-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
.gu-item {
  display:flex; align-items:center; gap:4px; padding:3px 4px;
  border-radius:4px; cursor:pointer; font-size:12px;
}
.gu-item .count { color:#999; font-size:11px; margin-left:auto; }
.top-roads { margin-bottom:16px; }
.road-item {
  display:flex; align-items:center; padding:8px; border-radius:8px; cursor:pointer; margin-bottom:2px;
  transition:background 0.2s;
}
.road-item:hover { background:rgba(0,0,0,0.04); }
.dark .road-item:hover { background:rgba(255,255,255,0.05); }
.road-rank {
  width:22px; height:22px; border-radius:50%;
  color:#fff; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  margin-right:8px; flex-shrink:0;
}
.road-info { flex:1; min-width:0; }
.road-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.road-gu { font-size:11px; color:#999; }
.road-count { font-size:13px; font-weight:700; margin-left:8px; }
.no-results { text-align:center; color:#999; font-size:13px; padding:20px 0; }
/* Height slider */
.height-filter { margin-bottom:16px; }
.height-filter .section-title { margin-bottom:12px; }
.height-values { display:flex; justify-content:space-between; font-size:11px; color:#888; margin-top:8px; }
#heightSlider { margin:0 8px; }
.noUi-target {
  background:#ccc !important; border-radius:10px !important;
  border:none !important; box-shadow:none !important;
}
#heightSlider .noUi-connect {
  background:#3b99fc;
}
#heightSlider .noUi-handle {
  width:18px; height:18px; border-radius:50%;
  top:0px; right:-9px;
  background:#fff; border:1px solid #8c8c8c;
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
  cursor:grab;
}
#heightSlider .noUi-handle:active { cursor:grabbing; }
#heightSlider .noUi-handle:before, #heightSlider .noUi-handle:after { display:none; }
.dark #heightSlider .noUi-target { background:#444; }
.dark #heightSlider .noUi-connect { background:#60a5fa; }
.dark #heightSlider .noUi-handle { background:#2a2a3e; border-color:#555; }
</style>

<body>
<div id="map"></div>
<div class="header">
  <div style="display:flex;align-items:center;">
    <h1>🌳 서울 가로수 지도</h1>
    <span class="header-stats" id="stats"></span>
  </div>
  <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 다크 모드</button>
</div>
<div class="panel" id="panel">
  <input type="text" class="search-box" id="search" placeholder="도로명 검색..." oninput="filterRoads()">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <div class="section-title" style="margin-bottom:0;padding-bottom:0;border-bottom:none;">수종</div>
    <div style="display:flex;gap:4px;">
      <button class="sp-all-btn" onclick="setAllSpecies(true)">전체 선택</button>
      <button class="sp-all-btn" onclick="setAllSpecies(false)">전체 해제</button>
    </div>
  </div>
  <div class="species-toggles" id="speciesToggle"></div>
  <div class="height-filter">
    <div class="section-title">수목 높이</div>
    <div id="heightSlider"></div>
    <div class="height-values"><span id="hMin">0m</span><span id="hMax">30m</span></div>
  </div>
  <div class="gu-filters">
    <div class="gu-header" id="guHeader" onclick="toggleGuPanel()">
      <span class="section-title">자치구 필터</span>
      <span class="gu-arrow" id="guArrow">&#9660;</span>
    </div>
    <div class="gu-body" id="guBody">
      <div class="gu-all">
        <button onclick="setAllGu(true)">전체 선택</button>
        <button onclick="setAllGu(false)">전체 해제</button>
      </div>
      <div class="gu-grid" id="guGrid"></div>
    </div>
  </div>
  <div class="top-roads">
    <div class="section-title">가로수길 TOP</div>
    <div id="roadList"></div>
  </div>
</div>
<div class="data-source" id="dataSource">
  서울 열린데이터광장 · <a href="https://data.seoul.go.kr/dataList/OA-1325/S/1/datasetView.do" target="_blank" style="color:#FFA000;">가로수 위치정보 (OA-1325)</a>
</div>
<button class="panel-toggle" id="panelToggle" onclick="togglePanel()">◀</button>

<script>
const DATA = {
  ginkgo:     { trees:[], roads:[], color:'#f0b429', markerFill:'#fce588', markerStroke:'#d99e10', label:'은행나무', active:true, loaded:false },
  platanus:   { trees:[], roads:[], color:'#47b881', markerFill:'#a3d9b1', markerStroke:'#2d9a64', label:'버즘나무', active:true, loaded:false },
  zelkova:    { trees:[], roads:[], color:'#a78a6e', markerFill:'#d6c4ae', markerStroke:'#8a6d50', label:'느티나무', active:true, loaded:false },
  cherry:     { trees:[], roads:[], color:'#f283a5', markerFill:'#fcc4d4', markerStroke:'#e0608a', label:'벚나무', active:true, loaded:false },
  metasequoia:{ trees:[], roads:[], color:'#3cc0ad', markerFill:'#96e0d5', markerStroke:'#20a08e', label:'메타세쿼이아', active:true, loaded:false },
  pagoda:     { trees:[], roads:[], color:'#a78bfa', markerFill:'#d4c4fe', markerStroke:'#8468e0', label:'회화나무', active:true, loaded:false },
  pine:       { trees:[], roads:[], color:'#5b9fd6', markerFill:'#adcfea', markerStroke:'#3a82ba', label:'소나무', active:true, loaded:false },
  snowbell:   { trees:[], roads:[], color:'#e6c84e', markerFill:'#f5e8a0', markerStroke:'#c4a520', label:'이팝나무', active:true, loaded:false },
  maple:      { trees:[], roads:[], color:'#e8705a', markerFill:'#f4b4a8', markerStroke:'#d04e38', label:'단풍류', active:true, loaded:false },
  etc:        { trees:[], roads:[], color:'#b0b0b0', markerFill:'#d8d8d8', markerStroke:'#909090', label:'기타', active:true, loaded:false }
};

async function loadSpecies(key) {
  if (DATA[key].loaded) return;
  const [treesRes, roadsRes] = await Promise.all([
    fetch('data/' + key + '_trees.json'),
    fetch('data/' + key + '_roads.json')
  ]);
  DATA[key].trees = await treesRes.json();
  DATA[key].roads = await roadsRes.json();
  DATA[key].loaded = true;
}

async function loadAllActive() {
  const promises = Object.keys(DATA).filter(k => DATA[k].active).map(k => loadSpecies(k));
  await Promise.all(promises);
}

let isDark = false;
let activeGus = new Set();
let lightTile, darkTile, map;
let layers = {};  // per-species layers
let heightRange = [0, 30];  // current filter range

// Height slider
const hSlider = document.getElementById('heightSlider');
noUiSlider.create(hSlider, {
  start: [0, 30],
  connect: true,
  behaviour: 'drag',
  range: { min: 0, max: 30 },
  step: 1,
  tooltips: false,
  format: { to: v => Math.round(v), from: v => Number(v) }
});
hSlider.noUiSlider.on('update', function(values) {
  heightRange = [values[0], values[1]];
  document.getElementById('hMin').textContent = values[0] + 'm';
  document.getElementById('hMax').textContent = values[1] + 'm';
});
hSlider.noUiSlider.on('change', function() {
  refresh();
});

// Count per gu (populated after load)
let guCounts = {};
let GUS = [];

// Stats
function updateStats() {
  let total = 0;
  const parts = [];
  for (const [key, sp] of Object.entries(DATA)) {
    if (sp.active) {
      total += sp.trees.length;
      parts.push(`${sp.label} ${sp.trees.length.toLocaleString()}`);
    }
  }
  document.getElementById('stats').textContent = parts.length ? `${total.toLocaleString()}그루 (${parts.join(' + ')})` : '';
}
let totalAllTrees = 0;

function renderSpeciesPills() {
  const container = document.getElementById('speciesToggle');
  container.innerHTML = '';
  for (const [key, sp] of Object.entries(DATA)) {
    const pct = totalAllTrees ? (sp.trees.length / totalAllTrees * 100).toFixed(1) : '0.0';
    const pill = document.createElement('label');
    pill.className = `species-pill ${sp.active ? 'active' : 'inactive'}`;
    if (sp.active) {
      pill.style.background = sp.color + '14';
      pill.style.borderColor = sp.color + '60';
      pill.style.color = sp.markerStroke;
    } else {
      pill.style.background = '';
      pill.style.borderColor = '';
      pill.style.color = '';
    }
    pill.innerHTML = `<input type="checkbox" ${sp.active ? 'checked' : ''}>` +
      `<span class="sp-dot" style="background:${sp.color}"></span>` +
      `${sp.label} <span class="sp-count">${sp.trees.length.toLocaleString()}</span>` +
      `<span class="sp-pct">${pct}%</span>`;
    pill.querySelector('input').onchange = function() {
      toggleSpecies(key, this.checked);
    };
    container.appendChild(pill);
  }
}
renderSpeciesPills();

function toggleGuPanel() {
  const body = document.getElementById('guBody');
  const header = document.getElementById('guHeader');
  body.classList.toggle('open');
  header.classList.toggle('open');
}

// Map
map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);

map.createPane('linePane'); map.getPane('linePane').style.zIndex = 360;
map.createPane('labelPane'); map.getPane('labelPane').style.zIndex = 370;

lightTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png?lang=ko', {
  attribution: '&copy; OSM &copy; CARTO', maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);
darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png?lang=ko', {
  attribution: '&copy; OSM &copy; CARTO', maxZoom: 19,
  subdomains: 'abcd'
});

// Init layers per species
for (const key of Object.keys(DATA)) {
  layers[key] = {
    treeGroup: L.layerGroup(),
    lineGroup: L.layerGroup({ pane: 'linePane' }),
  };
}
const labelGroup = L.layerGroup({ pane: 'labelPane' });

function getLineWeight(count) {
  return Math.min(5, Math.max(1.5, 0.8 + Math.sqrt(count) * 0.2));
}

function buildSpecies(key) {
  const sp = DATA[key];
  const ly = layers[key];

  // Trees
  ly.treeGroup.clearLayers();
  const hFilter = t => activeGus.has(t.gu) && (t.h === 0 || (t.h >= heightRange[0] && t.h <= heightRange[1]));
  sp.trees.filter(hFilter).forEach(t => {
    const m = L.circleMarker([t.lat, t.lng], {
      radius: 5, fillColor: sp.markerFill, fillOpacity: 0.85,
      color: sp.markerStroke, weight: 1
    });
    m.bindPopup(`<b>${t.name}</b><br>${t.road}<br>${t.gu}`);
    ly.treeGroup.addLayer(m);
  });

  // Build road-level height counts from individual trees
  const roadHeightCounts = {};
  sp.trees.forEach(t => {
    if (!activeGus.has(t.gu)) return;
    const rkey = t.road + '|' + t.gu;
    if (!roadHeightCounts[rkey]) roadHeightCounts[rkey] = 0;
    if (t.h === 0 || (t.h >= heightRange[0] && t.h <= heightRange[1])) {
      roadHeightCounts[rkey]++;
    }
  });

  // Road lines — only show if matching trees exist in height range
  ly.lineGroup.clearLayers();
  sp.roads.filter(r => activeGus.has(r.gu) && r.segments && r.segments.length > 0).forEach(r => {
    const rkey = r.road + '|' + r.gu;
    const filteredCount = roadHeightCounts[rkey] || 0;
    if (filteredCount === 0) return;
    const weight = getLineWeight(filteredCount);
    const types = Object.entries(r.types).map(([k,v]) => `${k}: ${v}`).join('<br>');
    r.segments.forEach(seg => {
      const line = L.polyline(seg, {
        color: sp.color, weight: weight, opacity: 0.9,
        lineJoin: 'round', lineCap: 'round', pane: 'linePane'
      });
      line.bindPopup(`<b>${r.road}</b><br>${r.gu}<br>${filteredCount}그루 (높이 필터 적용)<br><small>${types}</small>`);
      ly.lineGroup.addLayer(line);
    });
  });
}

function buildLabels() {
  labelGroup.clearLayers();
  const zoom = map.getZoom();
  let maxLabels;
  if (zoom <= 11) maxLabels = 5;
  else if (zoom <= 12) maxLabels = 10;
  else if (zoom <= 13) maxLabels = 20;
  else if (zoom <= 14) maxLabels = 40;
  else maxLabels = 999;

  // Merge all active roads, sorted by count
  let allRoads = [];
  for (const [key, sp] of Object.entries(DATA)) {
    if (!sp.active) continue;
    sp.roads.filter(r => activeGus.has(r.gu) && r.segments && r.segments.length > 0)
      .forEach(r => allRoads.push({ ...r, color: sp.color }));
  }
  allRoads.sort((a, b) => b.count - a.count);

  const placed = [];
  let count = 0;
  for (const r of allRoads) {
    if (count >= maxLabels) break;
    const pt = map.latLngToContainerPoint([r.center_lat, r.center_lng]);
    const text = r.road + ' (' + r.count + ')';
    const w = text.length * 7;
    const h = 16;
    const box = { x: pt.x, y: pt.y, w, h };
    const overlaps = placed.some(b =>
      box.x < b.x + b.w + 8 && box.x + box.w + 8 > b.x &&
      box.y < b.y + b.h + 4 && box.y + box.h + 4 > b.y
    );
    if (overlaps) continue;
    placed.push(box);
    const label = L.marker([r.center_lat, r.center_lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="white-space:nowrap;font-size:11px;font-weight:600;color:${r.color};text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,0 0 4px #fff;pointer-events:none;">${text}</div>`,
        iconAnchor: [w/2, h/2]
      }),
      interactive: false, pane: 'labelPane'
    });
    labelGroup.addLayer(label);
    count++;
  }
}

function updateVisibility() {
  const zoom = map.getZoom();
  for (const [key, sp] of Object.entries(DATA)) {
    const ly = layers[key];
    if (!sp.active) {
      if (map.hasLayer(ly.treeGroup)) map.removeLayer(ly.treeGroup);
      if (map.hasLayer(ly.lineGroup)) map.removeLayer(ly.lineGroup);
      continue;
    }
    if (zoom >= 16) {
      if (!map.hasLayer(ly.treeGroup)) map.addLayer(ly.treeGroup);
      if (map.hasLayer(ly.lineGroup)) map.removeLayer(ly.lineGroup);
    } else {
      if (map.hasLayer(ly.treeGroup)) map.removeLayer(ly.treeGroup);
      if (!map.hasLayer(ly.lineGroup)) map.addLayer(ly.lineGroup);
    }
  }
  if (zoom >= 16) {
    if (map.hasLayer(labelGroup)) map.removeLayer(labelGroup);
  } else {
    if (!map.hasLayer(labelGroup)) map.addLayer(labelGroup);
    buildLabels();
  }
}
map.on('zoomend', updateVisibility);
map.on('moveend', () => { if (map.getZoom() < 16) buildLabels(); });

async function setAllSpecies(checked) {
  for (const key of Object.keys(DATA)) {
    DATA[key].active = checked;
    if (checked && !DATA[key].loaded) await loadSpecies(key);
  }
  if (checked) { buildGuData(); buildGuFilters(); }
  for (const key of Object.keys(DATA)) buildSpecies(key);
  renderSpeciesPills();
  updateStats();
  updateVisibility();
  renderRoadList();
}

async function toggleSpecies(key, checked) {
  DATA[key].active = checked;
  if (checked && !DATA[key].loaded) {
    await loadSpecies(key);
    buildGuData();
    buildGuFilters();
    buildSpecies(key);
  }
  renderSpeciesPills();
  updateStats();
  updateVisibility();
  renderRoadList();
}

// Gu filters
function buildGuFilters() {
  const grid = document.getElementById('guGrid');
  grid.innerHTML = '';
  GUS.forEach(g => {
    const label = document.createElement('label');
    label.className = 'gu-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = activeGus.has(g);
    cb.onchange = () => {
      if (cb.checked) activeGus.add(g); else activeGus.delete(g);
      refresh();
    };
    const span = document.createElement('span');
    span.textContent = g;
    const cnt = document.createElement('span');
    cnt.className = 'count';
    cnt.textContent = guCounts[g] || 0;
    label.append(cb, span, cnt);
    grid.appendChild(label);
  });
}

function setAllGu(checked) {
  if (checked) GUS.forEach(g => activeGus.add(g));
  else activeGus.clear();
  buildGuFilters();
  refresh();
}

// Road list
function renderRoadList(filtered) {
  const container = document.getElementById('roadList');
  let allRoads = filtered;
  if (!allRoads) {
    allRoads = [];
    for (const [key, sp] of Object.entries(DATA)) {
      if (!sp.active) continue;
      sp.roads.filter(r => activeGus.has(r.gu))
        .forEach(r => allRoads.push({ ...r, color: sp.color }));
    }
    allRoads.sort((a, b) => b.count - a.count);
  }
  if (allRoads.length === 0) {
    container.innerHTML = '<div class="no-results">결과 없음</div>';
    return;
  }
  container.innerHTML = allRoads.slice(0, 30).map((r, i) => `
    <div class="road-item" onclick="flyToRoad(${r.center_lat},${r.center_lng})">
      <div class="road-rank" style="background:${r.color};">${i+1}</div>
      <div class="road-info">
        <div class="road-name">${r.road}</div>
        <div class="road-gu">${r.gu}</div>
      </div>
      <div class="road-count" style="color:${r.color};">${r.count}</div>
    </div>
  `).join('');
}

function filterRoads() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) { renderRoadList(); return; }
  let matched = [];
  for (const [key, sp] of Object.entries(DATA)) {
    if (!sp.active) continue;
    sp.roads.filter(r => activeGus.has(r.gu) && (r.road.toLowerCase().includes(q) || r.gu.includes(q)))
      .forEach(r => matched.push({ ...r, color: sp.color }));
  }
  matched.sort((a, b) => b.count - a.count);
  renderRoadList(matched);
}

function flyToRoad(lat, lng) { map.flyTo([lat, lng], 16, { duration: 1.5 }); }

function toggleMode() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('modeBtn').textContent = isDark ? '☀️ 라이트 모드' : '🌙 다크 모드';
  if (isDark) { map.removeLayer(lightTile); darkTile.addTo(map); }
  else { map.removeLayer(darkTile); lightTile.addTo(map); }
}

function togglePanel() {
  const panel = document.getElementById('panel');
  panel.classList.toggle('collapsed');
  document.getElementById('panelToggle').textContent = panel.classList.contains('collapsed') ? '▶' : '◀';
}

function refresh() {
  for (const key of Object.keys(DATA)) buildSpecies(key);
  buildLabels();
  updateVisibility();
  updateStats();
  renderRoadList();
}

function buildGuData() {
  guCounts = {};
  for (const [key, sp] of Object.entries(DATA)) {
    sp.trees.forEach(t => { guCounts[t.gu] = (guCounts[t.gu] || 0) + 1; });
  }
  GUS = Object.keys(guCounts).sort();
  GUS.forEach(g => activeGus.add(g));
  totalAllTrees = Object.values(DATA).reduce((s, sp) => s + sp.trees.length, 0);
}

// Init — load all data then render
(async function init() {
  document.getElementById('stats').textContent = '데이터 로딩 중...';
  await loadAllActive();
  buildGuData();
  buildGuFilters();
  for (const key of Object.keys(DATA)) buildSpecies(key);
  updateStats();
  renderSpeciesPills();
  buildLabels();
  updateVisibility();
  renderRoadList();
})();
</script>
</body>
</html>
